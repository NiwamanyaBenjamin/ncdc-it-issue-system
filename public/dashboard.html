<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>
  <audio id="notifySound" src="/assets/notify.mp3" preload="auto"></audio>

  <main id="appPage" class="app-layout">
    <aside class="sidebar">
      <h2>NCDC IT System</h2>

      <button class="nav-btn active" data-view="dashboard">Dashboard</button>
      <button class="nav-btn" data-view="report">Report Issue</button>
      <button class="nav-btn" data-view="issues">Issues</button>
      <button class="nav-btn" data-view="updates">Issue Updates</button>
      <button class="nav-btn admin-manager-only" data-view="users">Users</button>
      <button class="nav-btn admin-only" data-view="audit">Audit Logs</button>

      <button id="logoutBtn" class="logout-btn">Logout</button>
    </aside>

    <section class="main-content">
      <header class="topbar">
        <div>
          <h1 id="pageTitle">Dashboard</h1>
          <p id="welcomeText"></p>
        </div>

        <div class="user-box">
          <strong id="currentUserName"></strong>
          <span id="currentUserRole"></span>
        </div>
      </header>

      <section id="content"></section>

      <footer class="system-footer">
        <strong>NCDC IT Issue Resolution Management System</strong><br>
        Developed by Group 17 - Makerere University © 2026
      </footer>
    </section>
  </main>

  <script src="/js/app.js"></script>
</body>
</html>
